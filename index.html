<head>

<style>
  :root {

    --rule:#E2DFDC; --paper:#F8F6F3; --white:#FFFFFF;
    --accent:#7744FF; --accent-lt:#EDE8FF; --accent-deep:#5A2FD6;
    --red:#C0392B; --red-lt:#FBE9E7;
    --green:#1D7A4A; --green-lt:#E9F6EF;

  .nav-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
  .week-badge { font-size:11px; font-weight:600; color:var(--ink-soft); background:var(--white); border:1px solid var(--rule); padding:5px 12px; border-radius:30px; white-space:nowrap; }
  .search-input { font-family:var(--sans); font-size:12px; background:var(--white); border:1px solid var(--rule); color:var(--ink); padding:6px 14px; border-radius:30px; outline:none; width:160px; }
  .search-input::placeholder { color:var(--ink-soft); }
  .search-input:focus { border-color:var(--accent); }
  .refresh-btn { font-family:var(--sans); font-size:12px; font-weight:700; color:var(--accent); background:var(--accent-lt); border:1px solid var(--accent); padding:6px 14px; border-radius:30px; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .15s; white-space:nowrap; }
  .refresh-btn:hover { background:var(--accent); color:#fff; }
  .refresh-btn:disabled { opacity:0.5; cursor:not-allowed; }
  .refresh-btn.spinning .spin-icon { display:inline-block; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .last-updated { font-size:10.5px; color:var(--ink-soft); white-space:nowrap; }

  /* LOADING / ERROR */
  .loading-screen { max-width:var(--max); margin:80px auto; padding:0 28px; text-align:center; }
  .loading-spinner { width:40px; height:40px; border:3px solid var(--rule); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
  .loading-text { font-size:14px; color:var(--ink-soft); }

  /* SUMMARY */
  .eyebrow { font-size:11px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); margin-bottom:10px; }
  .stat-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:10px; }
  .stat-card { background:var(--white); border:1px solid var(--rule); border-radius:12px; padding:14px 16px; }
  .stat-label { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:5px; }

  .mini-legend-dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; }
  .mini-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(26,24,24,0.55); z-index:50; align-items:center; justify-content:center; padding:24px; }

  .modal-header { padding:20px 22px 14px; border-bottom:1px solid var(--rule); display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .modal-name { font-family:var(--serif); font-size:20px; font-weight:400; line-height:1.2; }
  .modal-meta-row { display:flex; align-items:center; gap:8px; margin-top:5px; flex-wrap:wrap; }
  .modal-arr { font-size:13px; font-weight:700; color:var(--accent); }
  .close-btn { font-family:var(--sans); width:28px; height:28px; border-radius:50%; background:var(--paper); border:1px solid var(--rule); color:var(--ink-soft); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .close-btn:hover { background:var(--ink); color:#fff; border-color:var(--ink); }
  .modal-body { padding:18px 22px; display:flex; flex-direction:column; gap:16px; }
  .modal-sec-title { font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; padding-bottom:5px; border-bottom:1px solid var(--rule); }
  .modal-3grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
  .modal-2grid { display:grid; grid-template-columns:repeat(2,1fr); gap:7px; }
  .modal-cell { background:var(--paper); border:1px solid var(--rule); border-radius:10px; padding:10px; text-align:center; }
  .modal-cell-val { font-family:var(--serif); font-size:18px; font-weight:400; }
  .modal-cell-lbl { font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft); margin-top:2px; }
  .priority-box { background:var(--amber-lt); border:1px solid #e8d0a0; border-radius:10px; padding:11px 13px; }
  .priority-box .lbl { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--amber); margin-bottom:4px; }
  .priority-box .val { font-size:13px; color:var(--ink); font-weight:500; line-height:1.5; }
  .priority-line { display:block; }
  .help-box { border-radius:10px; padding:11px 13px; }
  .help-box.needed { background:var(--red-lt); border:1px solid #f0c4bf; }
  .help-box.none   { background:var(--paper); border:1px solid var(--rule); }
  .help-box .lbl { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px; }
  .help-box.needed .lbl { color:var(--red); } .help-box.none .lbl { color:var(--ink-soft); }
  .help-box .val { font-size:13px; font-weight:600; }
  .help-box.needed .val { color:var(--red); } .help-box.none .val { color:var(--ink-soft); font-style:italic; }
  .na-val { color:var(--ink-soft); font-style:italic; font-size:13px; }

  .empty-state { text-align:center; padding:60px 28px; color:var(--ink-soft); font-size:14px; }

  /* TESTIMONIALS */
  .testimonials-section { background:#16172B; border-radius:16px; padding:26px 26px 22px; }
  .testimonials-eyebrow { font-size:11px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:#9B82FF; margin-bottom:16px; }
  .testimonials-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(340px, 1fr)); gap:14px; }
  .tcard { background:#1E2040; border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:20px 20px 16px; display:flex; flex-direction:column; gap:14px; position:relative; overflow:hidden; }
  .tcard::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#7744FF,#9B82FF); }
  .tcard-quote { font-family:var(--serif); font-size:14px; line-height:1.65; color:rgba(255,255,255,0.88); font-style:italic; }
  .tcard-quote em { font-style:normal; color:#9B82FF; }

  .tcard-avatar { width:40px; height:40px; border-radius:50%; background:rgba(119,68,255,0.3); border:2px solid rgba(119,68,255,0.4); display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-size:15px; font-weight:700; color:#9B82FF; flex-shrink:0; }
  .tcard-name { font-size:13px; font-weight:700; color:#fff; }
  .tcard-title { font-size:11px; color:rgba(255,255,255,0.45); margin-top:2px; }
  .tcard-account { display:inline-block; margin-top:5px; font-size:9.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; background:rgba(119,68,255,0.2); border:1px solid rgba(119,68,255,0.3); color:#9B82FF; padding:2px 8px; border-radius:10px; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpwVZC8gtTcXjuFKfzDK4GQgL49VuN2Oq3C7B4Byi_mGqBEze_qlQvC42Dr_16qn-C9uize7O-CVZy/pub?gid=1916327488&single=true&output=csv";
const CSV_URL = SHEET_URL;

const TESTIMONIALS = [
  {
    id:1,
    quote: "What impressed me most about Vieu was how it surfaced the information I actually needed, without me having to dig for it. Seeing warm paths into my actual target accounts, stakeholder insights, org charts, and key buying signals all in one place was genuinely exciting.",
    highlight: "It's the kind of intelligence that helps you spend less time researching and more time creating pipeline. I'm looking forward to making Vieu part of my day-to-day workflow.",
    tail: "",
    name: "Justin Anderson",
    title: "Healthcare Enterprise Account Executive",
    company: "Rubrik",
    initials: "JA",
  },
];

// --- CSV PARSER ---
function parseCSVLine(line) {
  // Proper CSV parser that handles quoted fields containing commas
  const result = [];
  let cur = "", inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === ',' && !inQuotes) { result.push(cur.trim()); cur = ""; }
    else { cur += ch; }
  }
  result.push(cur.trim());
  return result;
}

function parseCSV(text) {
  const rawLines = text.trim().split("\n");
  const lines = rawLines.map(l => parseCSVLine(l));

  // Find the header row — it contains "Customer Name"
  let headerIdx = lines.findIndex(r => r.some(c => c.toLowerCase().includes("customer name")));
  if (headerIdx < 0) return [];

  const headers = lines[headerIdx].map(h => h.toLowerCase().replace(/[^a-z0-9\s]/g,"").trim());

  // Find column index by partial match
  const col = (...names) => {
    for (const name of names) {
      const idx = headers.findIndex(h => h.includes(name));
      if (idx >= 0) return idx;
    }
    return -1;
  };

  // Column indices based on actual sheet headers
  const C = {
    name:      col("customer name"),
    am:        col("am"),
    csm:       col("csm"),
    associate: col("associate"),
    arr:       col("arr"),
    channel:   col("channel"),
    tier:      col("tier"),
    stage:     col("stage"),
    status:    col("status"),
    commit:    col("delivery commit"),
    delivered: col("delivered so far"),
    usersTouched:   col("users touched"),
    happyUsers:     col("happy users"),
    userTest:       col("user testimonials"),
    infTouched:     col("influencers touched"),
    happyInf:       col("happy influencers"),
    infTest:        col("influencer testimonials"),
    sponsorTouched: col("sponsor touched"),
    sponsorHappy:   col("sponsor happy"),
    priority:       col("priority for next", "next 1 week", "priority"),
    help:           col("help from"),
  };

  const rows = lines.slice(headerIdx + 1).filter(r =>
    C.name >= 0 && r[C.name] && r[C.name].trim() !== "" && r[C.name].trim() !== "-"
  );

  return rows.map((r, i) => {
    const g = idx => idx >= 0 && r[idx] ? r[idx].trim() : "";
    const num = idx => {
      const v = g(idx).replace(/[$,\s%]/g,"");
      return v === "" || v === "-" || v === "N/A" ? 0 : parseFloat(v) || 0;
    };
    const clean = v => (!v || v === "N/A" || v === "-" || v === "") ? null : v;

    return {
      id:        i + 1,
      name:      g(C.name),
      am:        g(C.am).replace(/\s+/g," "),
      csm:       g(C.csm).replace(/\s+/g," "),
      associate: g(C.associate).replace(/\s+/g," "),
      arr:       num(C.arr),
      channel:   g(C.channel) || "—",
      tier:      g(C.tier) || "-",
      stage:     g(C.stage) || "—",
      status:    g(C.status) || "Happy",
      commit:    num(C.commit) > 0 ? num(C.commit) : null,
      delivered: num(C.delivered) > 0 ? num(C.delivered) : null,
      users:   { reg: num(C.usersTouched), happy: num(C.happyUsers),  test: num(C.userTest) },
      inf:     { reg: num(C.infTouched),   happy: num(C.happyInf),    test: num(C.infTest) },
      sponsor: { touched: num(C.sponsorTouched), happy: num(C.sponsorHappy) },
      priority: clean(g(C.priority)),
      help:     clean(g(C.help)),
    };
  });
}

const fmtARR = v => v>=1000000?`$${(v/1e6).toFixed(1)}M`:v>=1000?`$${(v/1000).toFixed(0)}K`:v>0?`$${v}`:"TBD";
const calcPct = (a,b) => (!b||b===0) ? null : Math.round(a/b*100);
const STATUS_ORDER = { Churned:0, Unhappy:1, "At Risk":2, Happy:3 };

function Pill({ status }) {
  const map = { Happy:["pill-happy","dot-happy"], "At Risk":["pill-risk","dot-risk"], Unhappy:["pill-unhappy","dot-unhappy"], Churned:["pill-churned","dot-churned"] };
  const [pc,dc] = map[status]||["pill-happy","dot-happy"];
  return <span className={`pill ${pc}`}><span className={`pill-dot ${dc}`}/>{status}</span>;
}

function ProgressBar({ commit, delivered }) {
  const p = calcPct(delivered, commit);
  const display = p===null?"N/A":`${p}%`;
  const barW = p===null?0:Math.min(p,100);
  const cls = p===null?"pf-accent":p>=100?"pf-accent":p>=50?"pf-green":p>=25?"pf-amber":"pf-red";
  return (
    <div>
      <div className="delivery-row"><span>Delivery</span><span>{commit?`${delivered??0} / ${commit}`:"—"}</span></div>
      <div className="progress-wrap">
        <div className="progress-track"><div className={`progress-fill ${cls}`} style={{width:`${barW}%`}}/></div>
        <span className="progress-pct">{display}</span>
      </div>
    </div>
  );
}

function AccountCard({ a, onClick }) {
  const borderCls = a.status==="At Risk"?"border-risk":a.status==="Unhappy"?"border-unhappy":a.status==="Churned"?"border-churned":"";
  const userPct    = a.users.reg>0       ? Math.round(a.users.happy/a.users.reg*100)         : null;
  const infPct     = a.inf.reg>0         ? Math.round(a.inf.happy/a.inf.reg*100)             : null;
  const sponsorPct = a.sponsor.touched>0 ? Math.round(a.sponsor.happy/a.sponsor.touched*100) : null;
  const pctCls = p => p===null?"mini-pct":p>=67?"mini-pct mini-pct-green":p>=34?"mini-pct mini-pct-amber":"mini-pct mini-pct-red";
  const priorityLines = a.priority ? a.priority.split(/(?=\d+\.)/).map(s=>s.trim()).filter(Boolean) : [];

  return (
    <div className={`account-card ${borderCls}`} onClick={()=>onClick(a)}>
      <div className="card-top">
        <div>
          <div className="card-name">{a.name}</div>
          <div className="card-arr">{fmtARR(a.arr)}</div>
          <div className="card-tags">
            <span className="tag">{a.channel}</span>
            <span className="tag tag-accent">{a.stage}</span>
            {a.tier&&a.tier!=="-"&&<span className="tag">{a.tier}</span>}
          </div>
        </div>
        <Pill status={a.status}/>
      </div>
      <ProgressBar commit={a.commit} delivered={a.delivered}/>
      <div className="mini-legend"><span className="mini-legend-dot"/><span>% = Happy</span></div>
      <div className="mini-grid">
        <div className="mini-cell">
          <div className={pctCls(userPct)}>{userPct!==null?`${userPct}%`:"—"}</div>
          <div className="mini-sub">{a.users.reg} touched</div>
          <div className="mini-lbl">Users</div>
        </div>
        <div className="mini-cell">
          <div className={pctCls(infPct)}>{infPct!==null?`${infPct}%`:"—"}</div>
          <div className="mini-sub">{a.inf.reg} touched</div>
          <div className="mini-lbl">Influencers</div>
        </div>
        <div className="mini-cell">
          <div className={pctCls(sponsorPct)}>{sponsorPct!==null?`${sponsorPct}%`:"—"}</div>
          <div className="mini-sub">{a.sponsor.touched>0?`${a.sponsor.happy}/${a.sponsor.touched}`:"none"}</div>
          <div className="mini-lbl">Sponsor</div>
        </div>
      </div>
      {priorityLines.length>0&&(
        <div className="card-priority">
          {priorityLines.map((line,i)=><span key={i} className="card-priority-item">↗ {line}</span>)}
        </div>
      )}
      {a.help&&<div className="card-help">● LT: {a.help}</div>}
      <div className="card-csm">CSM: {a.csm} · {a.associate}</div>
    </div>
  );
}

function ModalCell({ value, label, color }) {
  return (
    <div className="modal-cell">
      <div className="modal-cell-val" style={color?{color}:{}}>{value}</div>
      <div className="modal-cell-lbl">{label}</div>
    </div>
  );
}

function Modal({ a, onClose }) {
  if (!a) return null;
  const p = calcPct(a.delivered, a.commit);
  const pColor = p===null?"var(--accent)":p>=100?"var(--accent)":p>=50?"var(--green)":p>=25?"var(--amber)":"var(--red)";
  const priorityLines = a.priority ? a.priority.split(/(?=\d+\.)/).map(s=>s.trim()).filter(Boolean) : [];
  return (
    <div className="modal-overlay open" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <div className="modal-name">{a.name}</div>
            <div className="modal-meta-row">
              <span className="modal-arr">{fmtARR(a.arr)}</span>
              <Pill status={a.status}/>
              <span className="tag">{a.channel}</span>
              <span className="tag tag-accent">{a.stage}</span>
            </div>
          </div>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div><div className="modal-sec-title">Team</div>
            <div className="modal-3grid">
              <ModalCell value={a.csm} label="CSM"/>
              <ModalCell value={a.am} label="AM"/>
              <ModalCell value={a.associate} label="Associate"/>
            </div>
          </div>
          <div><div className="modal-sec-title">Delivery</div>
            <div className="modal-3grid">
              <ModalCell value={a.commit??<span className="na-val">N/A</span>} label="Contracted"/>
              <ModalCell value={a.delivered??<span className="na-val">N/A</span>} label="Delivered"/>
              <ModalCell value={p===null?"N/A":`${p}%`} label="Progress" color={pColor}/>
            </div>
          </div>
          <div><div className="modal-sec-title">Users</div>
            <div className="modal-3grid">
              <ModalCell value={a.users.reg} label="Touched"/>
              <ModalCell value={a.users.happy} label="Happy" color="var(--green)"/>
              <ModalCell value={a.users.test} label="Testimonials" color="var(--accent)"/>
            </div>
          </div>
          <div><div className="modal-sec-title">Influencers</div>
            <div className="modal-3grid">
              <ModalCell value={a.inf.reg} label="Touched"/>
              <ModalCell value={a.inf.happy} label="Happy" color="var(--green)"/>
              <ModalCell value={a.inf.test} label="Testimonials" color="var(--accent)"/>
            </div>
          </div>
          <div><div className="modal-sec-title">Sponsor</div>
            <div className="modal-2grid">
              <ModalCell value={a.sponsor.touched} label="Touched"/>
              <ModalCell value={a.sponsor.happy} label="Happy" color={a.sponsor.happy>0?"var(--green)":"var(--red)"}/>
            </div>
          </div>
          <div><div className="modal-sec-title">This Week</div>
            {priorityLines.length>0
              ?<div className="priority-box"><div className="lbl">Priority</div><div className="val">{priorityLines.map((l,i)=><span key={i} className="priority-line">{l}</span>)}</div></div>
              :<div className="priority-box" style={{background:"var(--paper)",border:"1px solid var(--rule)"}}><div className="lbl" style={{color:"var(--ink-soft)"}}>Priority</div><div className="val" style={{color:"var(--ink-soft)",fontStyle:"italic",fontWeight:400}}>Not set</div></div>
            }
            <div style={{marginTop:8}} className={`help-box ${a.help?"needed":"none"}`}>
              <div className="lbl">Help from Leadership</div>
              <div className="val">{a.help||"None needed"}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function TestimonialsSection() {
  return (
    <div className="testimonials-section">
      <div className="testimonials-eyebrow">🌟 Testimonials this week</div>
      <div className="testimonials-grid">
        {TESTIMONIALS.map(t=>(
          <div key={t.id} className="tcard">
            <div className="tcard-quote">" {t.quote} <em>{t.highlight}</em> {t.tail} "</div>
            <div className="tcard-person">
              <div className="tcard-avatar">{t.initials}</div>
              <div>
                <div className="tcard-name">{t.name}</div>
                <div className="tcard-title">{t.title}</div>
                <span className="tcard-account">{t.company}</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [data, setData]         = useState([]);
  const [showPaste, setShowPaste] = useState(true);
  const [pasteText, setPasteText] = useState("");
  const [parseError, setParseError] = useState("");
  const [lastUpdated, setLastUpdated] = useState(null);
  const [filters, setFilters]   = useState({ status:"all", am:"all", csm:"all", associate:"all", channel:"all", stage:"all" });
  const [search, setSearch]     = useState("");
  const [selected, setSelected] = useState(null);

  // Parse tab-separated data (copied from Google Sheets)
  function parseTSV(text) {
    const lines = text.trim().split("\n").map(l => l.split("\t").map(c => c.trim()));
    let headerIdx = lines.findIndex(r => r.some(c => c.toLowerCase().includes("customer name")));
    if (headerIdx < 0) return null;
    const headers = lines[headerIdx].map(h => h.toLowerCase().replace(/[^a-z0-9\s]/g,"").trim());
    const col = (...names) => { for (const n of names) { const i = headers.findIndex(h=>h.includes(n)); if(i>=0) return i; } return -1; };
    const C = {
      name:col("customer name"), am:col("am"), csm:col("csm"), associate:col("associate"),
      arr:col("arr"), channel:col("channel"), tier:col("tier"), stage:col("stage"), status:col("status"),
      commit:col("delivery commit"), delivered:col("delivered so far"),
      usersTouched:col("users touched"), happyUsers:col("happy users"), userTest:col("user testimonials"),
      infTouched:col("influencers touched"), happyInf:col("happy influencers"), infTest:col("influencer testimonials"),
      sponsorTouched:col("sponsor touched"), sponsorHappy:col("sponsor happy"),
      priority:col("priority for next","next 1 week","priority"), help:col("help from"),
    };
    const rows = lines.slice(headerIdx+1).filter(r => C.name>=0 && r[C.name] && r[C.name].trim() !== "" && r[C.name].trim() !== "-");
    if (rows.length === 0) return null;
    return rows.map((r,i) => {
      const g = idx => idx>=0 && r[idx] ? r[idx].trim() : "";
      const num = idx => { const v=g(idx).replace(/[$,\s%]/g,""); return v===""||v==="-"||v==="N/A"?0:parseFloat(v)||0; };
      const clean = v => (!v||v==="N/A"||v==="-"||v==="") ? null : v;
      return {
        id:i+1, name:g(C.name), am:g(C.am), csm:g(C.csm), associate:g(C.associate),
        arr:num(C.arr), channel:g(C.channel)||"—", tier:g(C.tier)||"-", stage:g(C.stage)||"—", status:g(C.status)||"Happy",
        commit:num(C.commit)>0?num(C.commit):null, delivered:num(C.delivered)>0?num(C.delivered):null,
        users:{reg:num(C.usersTouched),happy:num(C.happyUsers),test:num(C.userTest)},
        inf:{reg:num(C.infTouched),happy:num(C.happyInf),test:num(C.infTest)},
        sponsor:{touched:num(C.sponsorTouched),happy:num(C.sponsorHappy)},
        priority:clean(g(C.priority)), help:clean(g(C.help)),
      };
    });
  }

  function handleLoad() {
    setParseError("");
    const parsed = parseTSV(pasteText);
    if (!parsed) { setParseError("Could not find data — make sure you copied the full sheet including headers."); return; }
    setData(parsed);
    setLastUpdated(new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
    setShowPaste(false);
  }

  const setF = (key,val) => setFilters(f=>({...f,[key]:val}));
  const activeCount = Object.values(filters).filter(v=>v!=="all").length;
  const clearAll = () => setFilters({status:"all",am:"all",csm:"all",associate:"all",channel:"all",stage:"all"});
  const uniq = key => ["all",...new Set(data.map(a=>a[key]).filter(Boolean).map(v=>String(v).trim()).filter(v=>v&&v!=="-"))];

  const happy   = data.filter(a=>a.status==="Happy");
  const atRisk  = data.filter(a=>a.status==="At Risk");
  const unhappy = data.filter(a=>a.status==="Unhappy");
  const churned = data.filter(a=>a.status==="Churned");
  const needsLT = data.filter(a=>a.help);
  const totalUsers  = data.reduce((s,a)=>s+a.users.reg,0);
  const happyUsers  = data.reduce((s,a)=>s+a.users.happy,0);
  const totalTests  = data.reduce((s,a)=>s+a.users.test+a.inf.test,0);
  const totalARR    = data.reduce((s,a)=>s+a.arr,0);

  const filtered = data
    .filter(a=>filters.status==="all"    ||a.status===filters.status)
    .filter(a=>filters.am==="all"        ||a.am===filters.am)
    .filter(a=>filters.csm==="all"       ||a.csm===filters.csm)
    .filter(a=>filters.associate==="all" ||a.associate===filters.associate)
    .filter(a=>filters.channel==="all"   ||a.channel===filters.channel)
    .filter(a=>filters.stage==="all"     ||a.stage===filters.stage)
    .filter(a=>!search||a.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>(STATUS_ORDER[a.status]??4)-(STATUS_ORDER[b.status]??4));

  const FILTER_DEFS = [
    {key:"status",label:"Status",opts:uniq("status")},
    {key:"am",label:"AM",opts:uniq("am")},
    {key:"csm",label:"CSM",opts:uniq("csm")},
    {key:"associate",label:"Associate",opts:uniq("associate")},
    {key:"channel",label:"Channel",opts:uniq("channel")},
    {key:"stage",label:"Stage",opts:uniq("stage")},
  ];

  const weekStr = lastUpdated
    ? new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})
    : new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});

  // PASTE SCREEN
  if (showPaste) return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px",background:"var(--paper)"}}>
      <div style={{width:"100%",maxWidth:580}}>
        <div style={{marginBottom:28,textAlign:"center"}}>
          <div style={{fontFamily:"var(--serif)",fontSize:26,fontWeight:400,color:"var(--ink)",marginBottom:8}}><b style={{color:"var(--accent)"}}>vieu</b> · Customer Dashboard</div>
          <div style={{fontSize:13,color:"var(--ink-soft)",lineHeight:1.6}}>To load your data, copy your Google Sheet and paste it below.</div>
        </div>

        <div style={{background:"var(--white)",border:"1px solid var(--rule)",borderRadius:16,padding:28}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:".12em",textTransform:"uppercase",color:"var(--accent)",marginBottom:16}}>How to load data</div>
          {[
            ["1","Open your Google Sheet"],
            ["2","Press Ctrl+A (or Cmd+A on Mac) to select all"],
            ["3","Press Ctrl+C (or Cmd+C) to copy"],
            ["4","Click in the box below and press Ctrl+V to paste"],
          ].map(([n,t])=>(
            <div key={n} style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}}>
              <span style={{width:22,height:22,borderRadius:"50%",background:"var(--accent-lt)",color:"var(--accent)",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{n}</span>
              <span style={{fontSize:13,color:"var(--ink)",paddingTop:2}}>{t}</span>
            </div>
          ))}

          <textarea
            style={{width:"100%",marginTop:16,height:120,fontFamily:"var(--sans)",fontSize:12,padding:"10px 12px",border:"1px solid var(--rule)",borderRadius:10,outline:"none",resize:"vertical",background:"var(--paper)",color:"var(--ink)"}}
            placeholder="Paste your Google Sheet data here…"
            value={pasteText}
            onChange={e=>setPasteText(e.target.value)}
            onFocus={e=>e.target.style.borderColor="var(--accent)"}
            onBlur={e=>e.target.style.borderColor="var(--rule)"}
          />
          {parseError && <div style={{color:"var(--red)",fontSize:12,marginTop:8}}>{parseError}</div>}
          <button
            onClick={handleLoad}
            disabled={!pasteText.trim()}
            style={{marginTop:14,width:"100%",fontFamily:"var(--sans)",fontSize:13,fontWeight:700,color:"#fff",background:pasteText.trim()?"var(--accent)":"var(--rule)",border:"none",borderRadius:30,padding:"11px 0",cursor:pasteText.trim()?"pointer":"not-allowed",transition:"background .15s"}}
          >
            Load Dashboard →
          </button>
        </div>
      </div>
    </div>
  );

  return (
    <>
      <nav className="nav">
        <div className="nav-in">
          <div className="brand"><b>vieu</b> · Customer Dashboard</div>
          <div className="nav-right">
            <input className="search-input" placeholder="Search accounts…" value={search} onChange={e=>setSearch(e.target.value)}/>
            {lastUpdated && <span className="last-updated">Updated {lastUpdated}</span>}
            <button className="refresh-btn" onClick={()=>{setShowPaste(true);setPasteText("");}}>
              ↻ Update Data
            </button>
            <span className="week-badge">Week of {weekStr}</span>
          </div>
        </div>
      </nav>

      <div className="main">
        <div>
          <div className="eyebrow">Major Accounts · CEO Sync</div>
          <div className="stat-grid">
            {[
              {label:"Total ARR",    value:fmtARR(totalARR), sub:null,                                      cls:"sv-accent"},
              {label:"Accounts",     value:data.length,       sub:null,                                      cls:"sv-ink"},
              {label:"Happy",        value:happy.length,      sub:`${data.length?Math.round(happy.length/data.length*100):0}% of portfolio`, cls:"sv-green"},
              {label:"At Risk",      value:atRisk.length,     sub:"Watch closely",                           cls:"sv-amber"},
              {label:"Unhappy",      value:unhappy.length,    sub:"Urgent",                                  cls:"sv-red"},
              {label:"Churned",      value:churned.length,    sub:"Lost",                                    cls:"sv-red"},
              {label:"Needs LT Help",value:needsLT.length,    sub:"This week",                               cls:"sv-red"},
            ].map(c=>(
              <div key={c.label} className="stat-card">
                <div className="stat-label">{c.label}</div>
                <div className={`stat-value ${c.cls}`}>{c.value}</div>
                {c.sub&&<div className="stat-sub">{c.sub}</div>}
              </div>
            ))}
          </div>
        </div>

        <TestimonialsSection/>

        {needsLT.length>0&&(
          <div className="lt-banner">
            <span className="lt-label">● Leadership action needed this week:</span>
            {needsLT.map(a=>(
              <button key={a.id} className="lt-chip" onClick={()=>setSelected(a)}>
                {a.name} — {a.help}
              </button>
            ))}
          </div>
        )}

        <div className="filter-bar">
          <span className="filter-bar-label">Filter</span>
          <div className="filter-divider"/>
          {FILTER_DEFS.map(f=>(
            <div key={f.key} className="filter-group">
              <span className="filter-group-label">{f.label}</span>
              <select className={`filter-select${filters[f.key]!=="all"?" active":""}`} value={filters[f.key]} onChange={e=>setF(f.key,e.target.value)}>
                {f.opts.map(o=><option key={o} value={o}>{o==="all"?`All ${f.label}s`:o}</option>)}
              </select>
            </div>
          ))}
          <div className="filter-divider"/>
          {activeCount>0&&<button className="filter-clear" onClick={clearAll}>✕ Clear {activeCount} filter{activeCount>1?"s":""}</button>}
          <span className="filter-results">{filtered.length} of {data.length} accounts</span>
        </div>

        <div className="account-grid">
          {filtered.map(a=><AccountCard key={a.id} a={a} onClick={setSelected}/>)}
        </div>
        {filtered.length===0&&<div className="empty-state">No accounts match your filter.</div>}

        <div className="page-footer">
          <span>{data.length} accounts · {fmtARR(totalARR)} ARR</span>
          <span>Users touched: {totalUsers} · Happy: {happyUsers}</span>
          <span>Total testimonials: {totalTests}</span>
          <span>Week of {weekStr}</span>
        </div>
      </div>

      {selected&&<Modal a={selected} onClose={()=>setSelected(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
